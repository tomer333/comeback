<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FD1B8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular badge -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGrad)" />
  
  <!-- Arrow pointing up (comeback/recovery symbol) -->
  <path d="M100 50 L100 130 M70 80 L100 50 L130 80" 
        stroke="white" stroke-width="12" stroke-linecap="round" 
        stroke-linejoin="round" fill="none"/>
</svg>
